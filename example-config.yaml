source:
  repo: myorg/myrepo
  host: github.com
  public: false

target:
  org: target-org
  host: github.mycompany.com
  name: my-mirror
  visibility: private  # Target repo visibility: private, public, or internal

auth:
  method: auto

copy:
  issues: true
  pull_requests: false
  wiki: true
  # releases sync automatically — no flag needed

verify:
  quick: true
  skip: false

lfs: true
force: false     # Set to true to do destructive mirror push (still prompts for confirmation)
code_only: false # Set to true to copy only branches/commits (no tags, releases, or metadata)
non_interactive: false # Set to true to skip confirmation prompts (for CI/CD)
verbose: false

exclude:
  workflows: false # Set to true to exclude .github/workflows/ from the target
  actions: false   # Set to true to exclude .github/actions/ from the target
  copilot: false   # Set to true to exclude Copilot instructions/skills from the target
  github: false    # Set to true to exclude entire .github/ directory (supersedes workflows, actions, copilot)
  # paths:         # Additional paths to exclude (uncomment and list as needed)
  #   - vendor
  #   - docs/internal

report:
  path: audit.json
  sign_key: ABCD1234
