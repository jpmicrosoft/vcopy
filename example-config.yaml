source:
  repo: myorg/myrepo
  host: github.com
  public: false

target:
  org: target-org
  host: github.mycompany.com
  name: my-mirror

auth:
  method: auto

copy:
  issues: true
  pull_requests: false
  wiki: true
  # releases sync automatically — no flag needed

verify:
  quick: true
  skip: false

lfs: true
force: false     # Set to true to do destructive mirror push (still prompts for confirmation)
code_only: false # Set to true to copy only branches/commits (no tags, releases, or metadata)
verbose: false

report:
  path: audit.json
  sign_key: ABCD1234
