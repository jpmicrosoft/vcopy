name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p bin

          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o bin/vcopy-linux-amd64       ./cmd/vcopy
          GOOS=linux   GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" -o bin/vcopy-linux-arm64       ./cmd/vcopy
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o bin/vcopy-darwin-amd64      ./cmd/vcopy
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" -o bin/vcopy-darwin-arm64      ./cmd/vcopy
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o bin/vcopy-windows-amd64.exe ./cmd/vcopy
          GOOS=windows GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" -o bin/vcopy-windows-arm64.exe ./cmd/vcopy

      - name: Generate checksums
        run: |
          cd bin
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/vcopy-linux-amd64
            bin/vcopy-linux-arm64
            bin/vcopy-darwin-amd64
            bin/vcopy-darwin-arm64
            bin/vcopy-windows-amd64.exe
            bin/vcopy-windows-arm64.exe
            bin/checksums.txt

      - name: Update major version tag
        run: |
          # Extract major version (e.g., v1 from v1.2.3)
          MAJOR=$(echo "${GITHUB_REF_NAME}" | grep -oE '^v[0-9]+')
          if [ -n "${MAJOR}" ]; then
            git tag -f "${MAJOR}"
            git push origin "${MAJOR}" --force
            echo "Updated floating tag: ${MAJOR}"
          fi
